name: Release

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build, test, and produce release artifact
        run: make release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: release-artifacts
          path: release-artifacts/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7
